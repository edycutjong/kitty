<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 400" width="1280" height="400" role="img" aria-label="The Kitty — serverless self-custodial prediction pot">
  <defs>
    <linearGradient id="kh-title" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/><stop offset="55%" stop-color="#26A17B"/><stop offset="100%" stop-color="#F5C542"/>
    </linearGradient>
    <radialGradient id="kh-pot" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#F5C542"/><stop offset="55%" stop-color="#E3B02F"/><stop offset="100%" stop-color="#8A6A12"/>
    </radialGradient>
    <linearGradient id="kh-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#26A17B"/><stop offset="100%" stop-color="#7FE3C0"/>
    </linearGradient>
    <radialGradient id="kh-gold" cx="40%" cy="30%" r="80%"><stop offset="0%" stop-color="#FCE491"/><stop offset="46%" stop-color="#F5C542"/><stop offset="100%" stop-color="#AF7A14"/></radialGradient>
    <linearGradient id="kh-shackle" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#8CE9C6"/><stop offset="100%" stop-color="#1B8C69"/></linearGradient>
    <filter id="kh-cshadow" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#000000" flood-opacity="0.4"/></filter>
    <radialGradient id="kh-bg" cx="80%" cy="12%" r="90%">
      <stop offset="0%" stop-color="#12321F"/><stop offset="45%" stop-color="#0B0E11"/><stop offset="100%" stop-color="#0B0E11"/>
    </radialGradient>
    <filter id="kh-soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="14"/></filter>
    <linearGradient id="kh-sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#26A17B" stop-opacity="0"/><stop offset="50%" stop-color="#26A17B" stop-opacity="0.5"/><stop offset="100%" stop-color="#26A17B" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="kh-clip"><rect width="1280" height="400" rx="20"/></clipPath>
    <linearGradient id="kh-gloss" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFF6D8" stop-opacity="0"/>
      <stop offset="46%" stop-color="#FFF6D8" stop-opacity="0.85"/>
      <stop offset="54%" stop-color="#FFFFFF" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#FFF6D8" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="kh-titleclip"><text x="66" y="176" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="92" font-weight="800" letter-spacing="-2">The Kitty</text></clipPath>
  </defs>

  <g clip-path="url(#kh-clip)" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
    <rect width="1280" height="400" fill="url(#kh-bg)"/>
    <!-- grid -->
    <g stroke="#26A17B" stroke-opacity="0.06">
      <path d="M0 100H1280M0 200H1280M0 300H1280"/>
      <path d="M160 0V400M320 0V400M480 0V400M640 0V400M800 0V400M960 0V400M1120 0V400"/>
    </g>
    <!-- scanning sweep -->
    <rect x="-320" y="0" width="320" height="400" fill="url(#kh-sweep)" opacity="0.6">
      <animate attributeName="x" values="-320;1280" dur="5.5s" repeatCount="indefinite"/>
    </rect>

    <!-- ── Left: brand ── -->
    <text x="70" y="88" fill="#7FE3C0" font-size="17" letter-spacing="4" font-weight="600">DORAHACKS · TETHER DEV CUP</text>
    <text x="66" y="176" fill="url(#kh-title)" font-size="92" font-weight="800" letter-spacing="-2">The Kitty</text>
    <!-- gold coin-glint shimmer (sweeps, then pauses) -->
    <g clip-path="url(#kh-titleclip)"><g transform="skewX(-16)">
      <rect x="-260" y="86" width="150" height="116" fill="url(#kh-gloss)">
        <animate attributeName="x" values="-260;660;660" keyTimes="0;0.5;1" dur="4.6s" repeatCount="indefinite"/>
      </rect>
    </g></g>
    <text x="70" y="224" fill="#C7D0DA" font-size="25" font-weight="500">The serverless, self-custodial prediction pot — no server, no house.</text>

    <!-- proof line -->
    <text x="70" y="272" fill="#F5C542" font-size="21" font-family="monospace" font-weight="700">Σ paid = Σ staked  ·  100% self-custodial</text>

    <!-- tech pills -->
    <g font-family="monospace" font-size="16" fill="#9AA4B0">
      <g><rect x="70" y="300" width="90" height="40" rx="20" fill="#12161C" stroke="#2A313B"/><circle cx="92" cy="320" r="4" fill="#26A17B"/><text x="104" y="326">Pear</text></g>
      <g><rect x="174" y="300" width="130" height="40" rx="20" fill="#12161C" stroke="#2A313B"/><circle cx="196" cy="320" r="4" fill="#26A17B"/><text x="208" y="326">Autobase</text></g>
      <g><rect x="318" y="300" width="82" height="40" rx="20" fill="#12161C" stroke="#2A313B"/><circle cx="340" cy="320" r="4" fill="#26A17B"/><text x="352" y="326">WDK</text></g>
      <g><rect x="414" y="300" width="98" height="40" rx="20" fill="#12161C" stroke="#2A313B"/><circle cx="436" cy="320" r="4" fill="#F5C542"/><text x="448" y="326">USD₮</text></g>
    </g>

    <!-- ── Right: the sealed pot (padlock) ── -->
    <g transform="translate(1030,196)">
      <!-- 'picks lock at kickoff' pulse -->
      <circle cx="0" cy="16" r="92" fill="none" stroke="#F5C542" stroke-width="3">
        <animate attributeName="r" values="92;146" dur="2.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.65;0" dur="2.8s" repeatCount="indefinite"/>
      </circle>
      <!-- serverless P2P mesh (peers hold the pot) -->
      <g stroke="#26A17B" stroke-width="4" fill="#26A17B">
        <path d="M-120 96 L0 158 L120 96" fill="none" stroke-opacity="0.4"/>
        <path d="M-120 96 L120 96" fill="none" stroke-opacity="0.26"/>
        <circle cx="-120" cy="96" r="12"><animate attributeName="fill-opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/></circle>
        <circle cx="120" cy="96" r="12"><animate attributeName="fill-opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/></circle>
        <circle cx="0" cy="158" r="12"><animate attributeName="fill-opacity" values="0.5;1;0.5" dur="2s" begin="0.8s" repeatCount="indefinite"/></circle>
      </g>
      <!-- padlock shackle -->
      <path d="M-40 20 V-70 A40 40 0 0 1 40 -70 V20" fill="none" stroke="url(#kh-shackle)" stroke-width="28" stroke-linecap="round"/>
      <!-- kitty coin = lock body, with keyhole (commit–reveal seal) -->
      <g filter="url(#kh-cshadow)">
        <circle cx="0" cy="16" r="90" fill="url(#kh-gold)"/>
        <circle cx="0" cy="16" r="90" fill="none" stroke="#7A5410" stroke-width="7" opacity="0.5"/>
        <ellipse cx="-28" cy="-14" rx="32" ry="19" fill="#FFFFFF" opacity="0.22"/>
        <g fill="#1A1403">
          <circle cx="0" cy="2" r="18"/>
          <path d="M-9 12 L-15 58 H15 L9 12 Z"/>
        </g>
      </g>
      <!-- pot total -->
      <text x="0" y="196" text-anchor="middle" fill="#F5C542" font-size="24" font-weight="800" font-family="monospace">260 USD₮</text>
    </g>

    <!-- live badge -->
    <g transform="translate(1052,44)">
      <rect x="0" y="0" width="202" height="34" rx="17" fill="#0E2A1E" stroke="#26A17B" stroke-opacity="0.4"/>
      <circle cx="20" cy="17" r="5" fill="#26A17B"><animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/></circle>
      <text x="34" y="22" fill="#7FE3C0" font-family="monospace" font-size="13" letter-spacing="2">AUTOBASE SYNCED</text>
    </g>

    <rect x="1" y="1" width="1278" height="398" rx="19" fill="none" stroke="#2A313B"/>
  </g>
</svg>
